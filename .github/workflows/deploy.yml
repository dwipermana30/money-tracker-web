
name: Deploy Vite App to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Mengarahkan cache ke folder projek Anda
          cache-dependency-path: money-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: money-tracker

      - name: Build
        run: npm run build
        working-directory: money-tracker

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Mengarahkan folder hasil build Vite (dist) di dalam money-tracker
          path: 'money-tracker/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
